<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#2D6A4F"/>

  <!-- Cow body - main oval -->
  <ellipse cx="256" cy="260" rx="140" ry="95" fill="#F4F1EC"/>

  <!-- Cow head -->
  <ellipse cx="256" cy="168" rx="62" ry="52" fill="#F4F1EC"/>

  <!-- Ears -->
  <ellipse cx="196" cy="142" rx="24" ry="14" fill="#F4F1EC" transform="rotate(-25 196 142)"/>
  <ellipse cx="316" cy="142" rx="24" ry="14" fill="#F4F1EC" transform="rotate(25 316 142)"/>
  <ellipse cx="196" cy="142" rx="16" ry="9" fill="#E8A0A0" transform="rotate(-25 196 142)"/>
  <ellipse cx="316" cy="142" rx="16" ry="9" fill="#E8A0A0" transform="rotate(25 316 142)"/>

  <!-- Eyes -->
  <circle cx="236" cy="162" r="7" fill="#3D3D3D"/>
  <circle cx="276" cy="162" r="7" fill="#3D3D3D"/>
  <circle cx="238" cy="160" r="2.5" fill="#FFFFFF"/>
  <circle cx="278" cy="160" r="2.5" fill="#FFFFFF"/>

  <!-- Muzzle / nose area -->
  <ellipse cx="256" cy="192" rx="28" ry="18" fill="#E8D5C4"/>

  <!-- Nostrils -->
  <ellipse cx="245" cy="193" rx="5" ry="4" fill="#3D3D3D"/>
  <ellipse cx="267" cy="193" rx="5" ry="4" fill="#3D3D3D"/>

  <!-- Spots on body -->
  <ellipse cx="220" cy="240" rx="35" ry="28" fill="#3D3D3D" opacity="0.15" transform="rotate(-10 220 240)"/>
  <ellipse cx="300" cy="270" rx="28" ry="22" fill="#3D3D3D" opacity="0.15" transform="rotate(15 300 270)"/>
  <ellipse cx="250" cy="300" rx="20" ry="16" fill="#3D3D3D" opacity="0.15"/>

  <!-- Horns -->
  <path d="M218 138 Q205 110 215 100" stroke="#E8D5C4" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M294 138 Q307 110 297 100" stroke="#E8D5C4" stroke-width="8" fill="none" stroke-linecap="round"/>

  <!-- Legs -->
  <rect x="200" y="340" width="20" height="55" rx="8" fill="#F4F1EC"/>
  <rect x="240" y="340" width="20" height="55" rx="8" fill="#F4F1EC"/>
  <rect x="272" y="340" width="20" height="55" rx="8" fill="#F4F1EC"/>
  <rect x="312" y="340" width="20" height="55" rx="8" fill="#F4F1EC"/>

  <!-- Hooves -->
  <rect x="198" y="385" width="24" height="14" rx="6" fill="#E8D5C4"/>
  <rect x="238" y="385" width="24" height="14" rx="6" fill="#E8D5C4"/>
  <rect x="270" y="385" width="24" height="14" rx="6" fill="#E8D5C4"/>
  <rect x="310" y="385" width="24" height="14" rx="6" fill="#E8D5C4"/>

  <!-- Udder -->
  <ellipse cx="256" cy="348" rx="22" ry="14" fill="#E8A0A0"/>

  <!-- Tail -->
  <path d="M396 240 Q420 220 415 190 Q412 175 418 165" stroke="#F4F1EC" stroke-width="6" fill="none" stroke-linecap="round"/>
  <ellipse cx="418" cy="162" rx="8" ry="6" fill="#F4F1EC"/>
</svg>

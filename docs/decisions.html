<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyHerder — Technology Decisions & Debate Prep</title>
<style>
  :root {
    --primary: #2D6A4F;
    --primary-bg: #D8F3DC;
    --info: #2563EB;
    --warning: #D97706;
    --danger: #DC2626;
    --surface: #FFFFFF;
    --bg: #F8F9FA;
    --text: #1a1a2e;
    --muted: #6B7280;
    --border: #E5E7EB;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
  }

  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex; align-items: center; gap: 8px; height: 56px;
  }

  .topbar h1 { font-size: 17px; color: var(--primary); margin-right: 16px; }

  .filter-btn {
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 600;
    border: 2px solid var(--border);
    border-radius: 20px;
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover { border-color: var(--primary); color: var(--primary); }
  .filter-btn.active { border-color: var(--primary); background: var(--primary-bg); color: var(--primary); }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }

  .intro {
    text-align: center;
    margin-bottom: 36px;
  }

  .intro h2 { font-size: 24px; margin-bottom: 8px; }
  .intro p { font-size: 15px; color: var(--muted); max-width: 600px; margin: 0 auto; }

  /* ── Decision Card ── */
  .decision {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 16px;
    overflow: hidden;
    transition: box-shadow 0.15s;
  }

  .decision:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }

  .decision-header {
    padding: 18px 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 14px;
    user-select: none;
  }

  .decision-header:hover { background: #FAFAFA; }

  .decision-icon {
    width: 42px; height: 42px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .decision-header-text { flex: 1; }
  .decision-header-text h3 { font-size: 16px; margin-bottom: 2px; }
  .decision-header-text p { font-size: 13px; color: var(--muted); margin: 0; }

  .decision-category {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 12px;
    flex-shrink: 0;
  }

  .cat-frontend { background: #DBEAFE; color: #1E40AF; }
  .cat-backend { background: #D1FAE5; color: #065F46; }
  .cat-database { background: #F3E8FF; color: #6B21A8; }
  .cat-auth { background: #FEF2F2; color: #991B1B; }
  .cat-tooling { background: #FEF3C7; color: #92400E; }
  .cat-architecture { background: #F0F9FF; color: #0C4A6E; }
  .cat-offline { background: #FFF7ED; color: #9A3412; }

  .expand-arrow {
    font-size: 18px;
    color: var(--muted);
    transition: transform 0.2s;
    flex-shrink: 0;
  }

  .decision.open .expand-arrow { transform: rotate(180deg); }

  .decision-body {
    display: none;
    padding: 0 22px 22px;
    border-top: 1px solid #F3F4F6;
  }

  .decision.open .decision-body { display: block; }

  /* Sections inside decision */
  .d-section {
    margin-top: 20px;
  }

  .d-section h4 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .d-section p, .d-section li {
    font-size: 14px;
    line-height: 1.7;
  }

  .d-section ul {
    padding-left: 20px;
    margin-top: 4px;
  }

  .d-section li { margin-bottom: 6px; }

  /* Competitor cards */
  .vs-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
    margin-top: 8px;
  }

  .vs-card {
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    font-size: 13px;
  }

  .vs-card strong { display: block; font-size: 14px; margin-bottom: 4px; }
  .vs-card.chosen { border-color: var(--primary); background: #F0FDF4; }
  .vs-card.rejected { border-color: var(--border); background: #FAFAFA; }

  .vs-verdict {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
    margin-bottom: 6px;
  }

  .verdict-chosen { background: #D1FAE5; color: #065F46; }
  .verdict-passed { background: #FEE2E2; color: #991B1B; }
  .verdict-also { background: #FEF3C7; color: #92400E; }

  /* Debate section */
  .debate-box {
    margin-top: 12px;
    border-radius: 10px;
    overflow: hidden;
  }

  .debate-attack {
    padding: 14px 16px;
    background: #FEF2F2;
    border: 1px solid #FECACA;
    border-radius: 10px 10px 0 0;
    font-size: 14px;
  }

  .debate-attack strong {
    display: block;
    color: #991B1B;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }

  .debate-defend {
    padding: 14px 16px;
    background: #F0FDF4;
    border: 1px solid #BBF7D0;
    border-radius: 0 0 10px 10px;
    font-size: 14px;
  }

  .debate-defend strong {
    display: block;
    color: #065F46;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }

  .concede-box {
    margin-top: 12px;
    padding: 14px 16px;
    background: #FFFBEB;
    border: 1px solid #FDE68A;
    border-radius: 10px;
    font-size: 14px;
  }

  .concede-box strong {
    display: block;
    color: #92400E;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }

  /* Confidence meter */
  .confidence {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 12px;
    font-size: 13px;
    color: var(--muted);
  }

  .conf-bar {
    width: 120px;
    height: 8px;
    border-radius: 4px;
    background: #E5E7EB;
    overflow: hidden;
  }

  .conf-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.3s;
  }

  .conf-high  { background: #22C55E; }
  .conf-med   { background: #F59E0B; }
  .conf-low   { background: #EF4444; }

  /* Count badge */
  .count-badge {
    font-size: 12px;
    background: #F3F4F6;
    padding: 1px 7px;
    border-radius: 8px;
    color: var(--muted);
    margin-left: 4px;
  }

  @media (max-width: 600px) {
    .container { padding: 20px 16px; }
    .topbar { flex-wrap: wrap; height: auto; padding: 12px; gap: 6px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <h1>Decision Log</h1>
  <button class="filter-btn active" onclick="filterDecisions('all')">All <span class="count-badge" id="count-all"></span></button>
  <button class="filter-btn" onclick="filterDecisions('frontend')">Frontend</button>
  <button class="filter-btn" onclick="filterDecisions('backend')">Backend</button>
  <button class="filter-btn" onclick="filterDecisions('database')">Database</button>
  <button class="filter-btn" onclick="filterDecisions('architecture')">Architecture</button>
  <button class="filter-btn" onclick="filterDecisions('tooling')">Tooling</button>
  <button class="filter-btn" onclick="filterDecisions('offline')">Offline</button>
  <button class="filter-btn" onclick="filterDecisions('auth')">Auth</button>
</div>

<div class="container">

<div class="intro">
  <h2>Why We Built It This Way</h2>
  <p>Every technology decision, what alternatives existed, why we chose what we chose, and how to defend it to a senior developer. Click any card to expand.</p>
</div>

<div id="decisions-container"></div>

</div>

<script>
const decisions = [
  // ═══════════════════════════════
  //          FRONTEND
  // ═══════════════════════════════
  {
    id: 'vue3',
    icon: '🖼️',
    iconBg: '#DBEAFE',
    title: 'Vue 3 for the frontend framework',
    summary: 'Chose Vue over React, Angular, and Svelte',
    category: 'frontend',
    competitors: [
      {
        name: 'Vue 3',
        verdict: 'chosen',
        desc: 'Gentle learning curve, excellent docs, great for single devs and small teams. Composition API gives full flexibility. Huge ecosystem.'
      },
      {
        name: 'React',
        verdict: 'passed',
        desc: 'Biggest ecosystem and job market. But steeper learning curve, JSX mixes HTML and code, and you need to pick your own solutions for everything (state, routing, etc.).'
      },
      {
        name: 'Angular',
        verdict: 'passed',
        desc: 'Full-featured enterprise framework. But massive overkill for our app — steep learning curve, TypeScript required, heavy boilerplate.'
      },
      {
        name: 'Svelte',
        verdict: 'passed',
        desc: 'Smallest bundle, simplest syntax. But smaller ecosystem, fewer libraries, and harder to find help when stuck.'
      },
    ],
    why: 'Vue 3 hits the sweet spot for a project like ours: it\'s approachable enough for a small team, has batteries included (official router, state management, i18n), and the Composition API gives us the same power as React hooks. The documentation is considered the best in the industry. For a farm management app where the frontend needs to be maintainable by potentially one developer, Vue\'s "progressive framework" philosophy is ideal — you can start simple and add complexity only where needed.',
    attacks: [
      {
        attack: '"React has a bigger ecosystem and more developers. You\'ll have trouble hiring."',
        defend: 'True for large companies, but we\'re a small team. Vue\'s ecosystem has everything we need (Router, Pinia, i18n, Vite — all official). And Vue developers tend to be more productive per person because the framework makes more decisions for you, so you need fewer people.'
      },
      {
        attack: '"Vue is losing market share to React."',
        defend: 'Vue 3 is actually growing — it had 4.4M weekly npm downloads in 2024. It\'s the #2 framework globally and #1 in China, Asia, and much of Europe. Our app doesn\'t need the largest possible talent pool — it needs the right tool for a manageable, offline-first PWA.'
      }
    ],
    concede: 'If we were building for a large company with a big development team, React would be the safer hiring choice. And if we needed a very complex, form-heavy enterprise app, Angular might save time with its built-in form handling.',
    confidence: 90,
  },

  {
    id: 'composition-api',
    icon: '🧩',
    iconBg: '#DBEAFE',
    title: 'Composition API over Options API',
    summary: 'Vue 3 offers two styles — we chose the newer one',
    category: 'frontend',
    competitors: [
      {
        name: 'Composition API',
        verdict: 'chosen',
        desc: 'Logic is grouped by feature, not by type. Easier to share logic between components. Better TypeScript support. The future of Vue.'
      },
      {
        name: 'Options API',
        verdict: 'passed',
        desc: 'The original Vue style. Familiar to Vue 2 developers. More structured (data, methods, computed sections). Simpler for very small components.'
      },
    ],
    why: 'The Composition API lets us group related code together. In the Options API, the code for "loading cows" would be scattered across data(), methods, computed, and mounted sections. With Composition API, it\'s all in one place. It also lets us extract reusable logic into "composables" (like useAnalytics, useToast, useTour). The entire Vue ecosystem is moving this direction — Pinia was designed for it, and Vue\'s own docs now teach Composition API first.',
    attacks: [
      {
        attack: '"Options API is easier for beginners to understand."',
        defend: 'True for very simple components. But once a component grows past 50 lines, Options API becomes harder because related logic is scattered. Composition API scales better. And since we use <script setup> syntax, our components are actually shorter than Options API equivalents.'
      },
    ],
    concede: 'For a team of Vue 2 veterans, switching to Composition API has a learning cost. The Options API is still fully supported and not deprecated.',
    confidence: 95,
  },

  {
    id: 'pinia',
    icon: '🍍',
    iconBg: '#FEF3C7',
    title: 'Pinia for state management',
    summary: 'Chose Pinia over Vuex and alternatives',
    category: 'frontend',
    competitors: [
      {
        name: 'Pinia',
        verdict: 'chosen',
        desc: 'The official Vue 3 state manager. Simple API, great TypeScript support, devtools integration. Built by the Vue team.'
      },
      {
        name: 'Vuex',
        verdict: 'passed',
        desc: 'The original Vue state manager. Now in "maintenance mode" — the Vue team recommends Pinia instead. More boilerplate (mutations, actions, getters).'
      },
      {
        name: 'No state manager (just composables)',
        verdict: 'passed',
        desc: 'Could use shared refs/composables. Simpler but loses devtools, persistence plugins, and established patterns.'
      },
    ],
    why: 'Pinia is Vuex\'s official successor — it\'s what the Vue team recommends. It has less boilerplate (no mutations concept), works perfectly with Composition API, and has great devtools support. Since we have many stores (cows, milk, breeding, health, auth, sync, etc.), a proper state manager keeps things organized. Using Vuex for a new project in 2025 would be like starting a new project with an already-deprecated tool.',
    attacks: [
      {
        attack: '"You could have just used shared composables without a state manager."',
        defend: 'For 2-3 shared states, sure. But we have 10+ stores, some with complex async operations and offline fallbacks. Pinia gives us devtools inspection (see all store state live), proper hot-module replacement, and a consistent pattern. The overhead is minimal — Pinia is only 1KB gzipped.'
      },
    ],
    concede: 'For a much smaller app with only 1-2 data types, Pinia would be overkill. A simple composable sharing a ref would suffice.',
    confidence: 95,
  },

  {
    id: 'axios',
    icon: '📡',
    iconBg: '#FCE7F3',
    title: 'Axios for HTTP requests',
    summary: 'Chose Axios over the browser\'s built-in fetch',
    category: 'frontend',
    competitors: [
      {
        name: 'Axios',
        verdict: 'chosen',
        desc: 'Popular HTTP library. Has interceptors (auto-attach token, auto-handle 401), automatic JSON parsing, request cancellation, and works in Node.js too.'
      },
      {
        name: 'fetch (built-in)',
        verdict: 'passed',
        desc: 'Built into every browser — no extra dependency. But no interceptors, doesn\'t auto-reject on HTTP errors (404/500 resolve as "ok"), and needs more boilerplate for common tasks.'
      },
      {
        name: 'ky',
        verdict: 'passed',
        desc: 'Modern fetch wrapper. Smaller than Axios but less mature, smaller community.'
      },
    ],
    why: 'Interceptors are the killer feature. We have one request interceptor that automatically attaches the JWT token to every outgoing request, and one response interceptor that catches 401 errors (expired token) and redirects to login. Without interceptors, we\'d have to copy-paste this logic into every single API call across every store. Axios also auto-parses JSON and properly rejects on HTTP errors, which fetch does not.',
    attacks: [
      {
        attack: '"Axios is an unnecessary dependency. Fetch is built into the browser and can do everything Axios does."',
        defend: 'Fetch can do most things, but needs wrapper code for: interceptors, automatic JSON, error rejection, and timeout. By the time you write that wrapper, you\'ve basically rebuilt a worse version of Axios. Our interceptors handle auth tokens and 401 redirects in one place — without Axios, that logic would be duplicated across 10+ stores.'
      },
      {
        attack: '"Axios is 14KB. Every dependency adds to the bundle."',
        defend: 'True, but 14KB is tiny compared to our total bundle. And the alternative — writing and maintaining our own fetch wrapper — would cost more developer time than the 14KB is worth. The interceptor pattern alone saves hundreds of lines of duplicate code.'
      },
    ],
    concede: 'For a simple app with few API calls and no auth, fetch is the better choice — zero dependencies. If we were aggressively optimizing bundle size, we could replace Axios with a tiny custom fetch wrapper.',
    confidence: 80,
  },

  {
    id: 'vite',
    icon: '⚡',
    iconBg: '#FEF3C7',
    title: 'Vite as the build tool',
    summary: 'Chose Vite over Webpack and others',
    category: 'tooling',
    competitors: [
      {
        name: 'Vite',
        verdict: 'chosen',
        desc: 'Created by the Vue creator. Instant dev server startup, fast hot reload, modern defaults. The default choice for new Vue projects.'
      },
      {
        name: 'Webpack',
        verdict: 'passed',
        desc: 'The old standard. Extremely configurable but slow startup, complex config, and heavy. Still used in legacy projects.'
      },
      {
        name: 'Parcel',
        verdict: 'passed',
        desc: 'Zero-config bundler. Simple but less ecosystem support and fewer plugins.'
      },
    ],
    why: 'Vite was created by Evan You (the creator of Vue) and is the default recommendation for Vue projects. It starts the dev server in under 1 second (Webpack takes 10-30 seconds for a project this size). It uses native ES modules during development, so only the code you\'re actually looking at gets processed. For production, it uses Rollup (a mature bundler) to create optimized output. There is no reason to choose Webpack for a new Vue project in 2025.',
    attacks: [
      {
        attack: '"Webpack is more battle-tested and configurable."',
        defend: 'True historically, but Vite has been stable since 2021 and is now the default for Vue, Svelte, and many React projects. Our project doesn\'t need exotic Webpack features. And Vite uses Rollup under the hood for production — Rollup is as battle-tested as Webpack.'
      },
    ],
    concede: 'If we were migrating an existing Webpack project with complex custom loaders, staying on Webpack might make more sense than migrating.',
    confidence: 98,
  },

  {
    id: 'chartjs',
    icon: '📊',
    iconBg: '#DBEAFE',
    title: 'Chart.js for analytics charts',
    summary: 'Chose Chart.js over D3, ECharts, and others',
    category: 'frontend',
    competitors: [
      {
        name: 'Chart.js',
        verdict: 'chosen',
        desc: 'Simple, well-documented, good defaults. Covers all our chart types (line, bar, doughnut). Small learning curve.'
      },
      {
        name: 'D3.js',
        verdict: 'passed',
        desc: 'The most powerful visualization library. Can build anything. But incredibly steep learning curve — you\'re essentially writing SVG by hand.'
      },
      {
        name: 'ECharts',
        verdict: 'passed',
        desc: 'Powerful, especially for complex dashboards. But heavier (700KB+) and more enterprise-oriented.'
      },
      {
        name: 'ApexCharts',
        verdict: 'also',
        desc: 'Good alternative to Chart.js. More built-in interactivity. Slightly larger bundle.'
      },
    ],
    why: 'Our analytics show standard chart types: line charts for trends, bar charts for comparisons, doughnut charts for composition. Chart.js handles all of these with minimal configuration and good-looking defaults. D3 would be like using a fighter jet to go grocery shopping — incredibly powerful, but our charts are straightforward. Chart.js is also well-maintained with 60K+ GitHub stars and great Vue integration via vue-chartjs.',
    attacks: [
      {
        attack: '"D3 gives you unlimited customization. What if you need complex visualizations later?"',
        defend: 'If we ever need a custom herd genetics visualization or interactive calving timeline, we can add D3 for that specific view. But 95% of our charts are simple line/bar/doughnut — using D3 for those would triple our development time for zero user benefit.'
      },
    ],
    concede: 'If the product roadmap included complex, interactive, custom visualizations (like geographic herd maps or flow diagrams), D3 would be worth the investment.',
    confidence: 88,
  },

  {
    id: 'driverjs',
    icon: '🎯',
    iconBg: '#DBEAFE',
    title: 'driver.js for guided tours',
    summary: 'Chose driver.js over Shepherd.js, Intro.js, and custom implementation',
    category: 'frontend',
    competitors: [
      {
        name: 'driver.js',
        verdict: 'chosen',
        desc: 'Lightweight (5KB), no dependencies, smooth animations, good API. MIT license.'
      },
      {
        name: 'Shepherd.js',
        verdict: 'passed',
        desc: 'More features (advance conditions, modal tours). But heavier (40KB+), depends on Popper.js/Floating UI.'
      },
      {
        name: 'Intro.js',
        verdict: 'passed',
        desc: 'Popular but uses a restrictive license (AGPL) that would require us to open-source our app.'
      },
      {
        name: 'Custom implementation',
        verdict: 'passed',
        desc: 'Full control but weeks of work to build highlighting, positioning, step management, and animations.'
      },
    ],
    why: 'We needed simple step-by-step tours to help farmers learn the app. driver.js is 5KB (tiny), has zero dependencies, provides smooth highlight animations, and has a clean API. The critical factor: Intro.js has an AGPL license (would force our code to be open-source), while driver.js is MIT (do whatever you want). Building custom would have taken weeks for something driver.js gives us in an hour.',
    attacks: [
      {
        attack: '"Shepherd.js has better advanced features like conditional steps."',
        defend: 'Our tours are simple: highlight an element, show text, next step. We don\'t need conditional branching or modal tours. Shepherd.js would add 35KB of extra code for features we\'d never use.'
      },
    ],
    concede: 'If tours needed complex logic (skip steps based on user state, branch paths, embedded videos), Shepherd.js would be worth the extra weight.',
    confidence: 90,
  },

  // ═══════════════════════════════
  //          BACKEND
  // ═══════════════════════════════
  {
    id: 'express',
    icon: '🚂',
    iconBg: '#D1FAE5',
    title: 'Express.js for the backend server',
    summary: 'Chose Express over Fastify, Koa, NestJS, and others',
    category: 'backend',
    competitors: [
      {
        name: 'Express.js',
        verdict: 'chosen',
        desc: 'The most widely used Node.js server framework. Huge ecosystem, massive community, tons of middleware. Simple and flexible.'
      },
      {
        name: 'Fastify',
        verdict: 'passed',
        desc: '2-3x faster than Express in benchmarks. Built-in schema validation, great plugin system. But smaller ecosystem and less community support.'
      },
      {
        name: 'NestJS',
        verdict: 'passed',
        desc: 'Angular-style framework for Node. TypeScript-first, dependency injection, decorators. Very structured but heavy and opinionated.'
      },
      {
        name: 'Koa',
        verdict: 'passed',
        desc: 'Made by the Express creators, smaller and more modern. But tiny ecosystem compared to Express.'
      },
    ],
    why: 'Express is the "jQuery of Node.js servers" — it\'s everywhere, everyone knows it, and every problem has been solved before. When you Google any backend Node.js question, the first 10 answers are for Express. This matters enormously for a project where speed of development is more important than raw performance. Our app serves a few hundred farmers, not millions of concurrent users — Express\'s speed is more than enough. And every middleware we need (helmet, cors, JWT, rate limiting) has Express-compatible packages.',
    attacks: [
      {
        attack: '"Fastify is 2x faster. Express is old and slow."',
        defend: 'Our bottleneck is database queries, not HTTP framework speed. The difference between Express (15K req/s) and Fastify (30K req/s) is irrelevant when each request takes 50-200ms in database time anyway. We\'re serving a farming app to maybe 100 concurrent users, not building Twitter.'
      },
      {
        attack: '"NestJS provides better structure for large applications."',
        defend: 'NestJS is great for large teams with strict architecture requirements. But it requires TypeScript, dependency injection, decorators — all adding complexity we don\'t need. Our flat route-file structure is simple and predictable: one file per feature, all following the same pattern.'
      },
      {
        attack: '"Express 4 is old. Express 5 was in beta forever."',
        defend: 'Express 5 shipped in 2024 and we use it. Even Express 4 was stable and well-maintained — "old" doesn\'t mean "bad" for a framework with 64K GitHub stars and billions of downloads.'
      },
    ],
    concede: 'If we were building a high-throughput API serving millions of requests per second, Fastify would be the better choice. If we had a large team that needed strict architectural guidance, NestJS would enforce good patterns.',
    confidence: 88,
  },

  {
    id: 'joi',
    icon: '✅',
    iconBg: '#D1FAE5',

//          RENDERING
// ═══════════════════════════════

function renderDecisions(filter = 'all') {
  const container = document.getElementById('decisions-container');
  const filtered = filter === 'all' ? decisions : decisions.filter(d => d.category === filter);

  container.innerHTML = filtered.map(d => {
    const catClass = `cat-${d.category}`;
    const catLabel = d.category.charAt(0).toUpperCase() + d.category.slice(1);

    let compHtml = '<div class="vs-grid">';
    d.competitors.forEach(c => {
      const cardClass = c.verdict === 'chosen' ? 'chosen' : 'rejected';
      const verdictClass = c.verdict === 'chosen' ? 'verdict-chosen' : c.verdict === 'also' ? 'verdict-also' : 'verdict-passed';
      const verdictLabel = c.verdict === 'chosen' ? 'OUR CHOICE' : c.verdict === 'also' ? 'GOOD OPTION' : 'CONSIDERED';
      compHtml += `<div class="vs-card ${cardClass}">
        <span class="vs-verdict ${verdictClass}">${verdictLabel}</span>
        <strong>${c.name}</strong>
        ${c.desc}
      </div>`;
    });
    compHtml += '</div>';

    let debateHtml = '';
    d.attacks.forEach(a => {
      debateHtml += `<div class="debate-box">
        <div class="debate-attack">
          <strong>A senior dev might say:</strong>
          ${a.attack}
        </div>
        <div class="debate-defend">
          <strong>Your response:</strong>
          ${a.defend}
        </div>
      </div>`;
    });

    const confClass = d.confidence >= 85 ? 'conf-high' : d.confidence >= 70 ? 'conf-med' : 'conf-low';
    const confLabel = d.confidence >= 85 ? 'High confidence' : d.confidence >= 70 ? 'Moderate confidence' : 'Would reconsider';

    return `<div class="decision" data-category="${d.category}" id="dec-${d.id}">
      <div class="decision-header" onclick="toggleDecision('${d.id}')">
        <div class="decision-icon" style="background:${d.iconBg};">${d.icon}</div>
        <div class="decision-header-text">
          <h3>${d.title}</h3>
          <p>${d.summary}</p>
        </div>
        <span class="decision-category ${catClass}">${catLabel}</span>
        <span class="expand-arrow">▼</span>
      </div>
      <div class="decision-body">

        <div class="d-section">
          <h4>📋 The Options We Considered</h4>
          ${compHtml}
        </div>

        <div class="d-section">
          <h4>💡 Why We Made This Choice</h4>
          <p>${d.why}</p>
        </div>

        <div class="d-section">
          <h4>⚔️ Debate Prep — How to Defend This Decision</h4>
          ${debateHtml}
        </div>

        <div class="d-section">
          <h4>🤝 When to Concede</h4>
          <div class="concede-box">
            <strong>Be honest — say this if pressed:</strong>
            ${d.concede}
          </div>
        </div>

        <div class="confidence">
          <span>Decision confidence:</span>
          <div class="conf-bar"><div class="conf-fill ${confClass}" style="width:${d.confidence}%"></div></div>
          <span>${d.confidence}% — ${confLabel}</span>
        </div>

      </div>
    </div>`;
  }).join('');

  document.getElementById('count-all').textContent = decisions.length;
}

function toggleDecision(id) {
  document.getElementById(`dec-${id}`).classList.toggle('open');
}

function filterDecisions(cat) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderDecisions(cat);
}

renderDecisions();
</script>

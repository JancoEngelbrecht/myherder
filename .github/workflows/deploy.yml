name: Deploy to cPanel

on:
  push:
    branches: [main]

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Install server dependencies
        run: npm ci

      - name: Install client dependencies
        run: cd client && npm ci

      - name: Lint (includes security rules)
        run: npm run lint

      - name: Backend type check
        run: npm run typecheck

      - name: Frontend type check
        run: cd client && npx vue-tsc --noEmit
        continue-on-error: true  # Pre-existing TS errors — don't block deploy

      - name: Backend tests
        run: npm test
        timeout-minutes: 5

      - name: Frontend tests
        run: cd client && npm run test:run

      - name: Build server (for boot test)
        run: npm run build:server

      - name: Production boot test
        run: |
          # Verify compiled server starts without crashing (catches missing modules)
          NODE_ENV=test timeout 10 node dist/index.js &
          SERVER_PID=$!
          sleep 3
          if kill -0 $SERVER_PID 2>/dev/null; then
            echo "Boot test passed — server started successfully"
            kill $SERVER_PID
            wait $SERVER_PID 2>/dev/null || true
          else
            echo "Boot test FAILED — server crashed on startup"
            exit 1
          fi

      - name: Dependency audit
        run: npm audit --audit-level=high || true

      - name: Dead code check (knip)
        run: npx knip || true

  deploy:
    needs: quality-gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Install all dependencies
        run: npm ci

      - name: Build server TypeScript
        run: npm run build:server

      - name: Build frontend
        run: cd client && npm ci && npm run build

      - name: Prepare production node_modules
        run: |
          # Prune to production-only deps (devDependencies never touch prod)
          rm -rf node_modules
          npm ci --omit=dev --ignore-scripts

      - name: Build deploy tarball
        run: |
          # Explicit allowlist — only files the server needs at runtime.
          # No source .ts, no tests, no plans/, no docs, no CI configs.
          tar czf deploy.tar.gz \
            app.js \
            package.json \
            package-lock.json \
            knexfile.js \
            dist \
            client/dist \
            node_modules \
            server/migrations \
            server/seeds/production
          ls -lh deploy.tar.gz

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: ssh-keyscan -H myherder.co.za >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload deploy tarball
        run: |
          # Upload to user's home dir — always writable on cPanel shared hosting
          # (some cPanel hosts restrict /tmp)
          scp -v deploy.tar.gz myherder@myherder.co.za:/home/myherder/deploy.tar.gz 2>&1 | tail -20
          echo "Upload OK"

      - name: Run remote deploy
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          ssh -o StrictHostKeyChecking=no myherder@myherder.co.za "GITHUB_SHA='${GITHUB_SHA}' bash -s" << 'DEPLOY'
            set -euo pipefail

            DEPLOY_DIR=/home/myherder/repositories/myherder
            TARBALL=/home/myherder/deploy.tar.gz

            echo ">>> [1/8] Activating nodevenv"
            source /home/myherder/nodevenv/repositories/myherder/24/bin/activate

            echo ">>> [2/8] Verifying tarball exists"
            if [ ! -f "$TARBALL" ]; then
              echo "FATAL: $TARBALL not found" >&2
              exit 1
            fi
            ls -lh "$TARBALL"

            echo ">>> [3/8] Entering deploy dir"
            cd "$DEPLOY_DIR"
            if [ "$(pwd)" != "$DEPLOY_DIR" ]; then
              echo "FATAL: cwd is $(pwd), expected $DEPLOY_DIR" >&2
              exit 1
            fi

            echo ">>> [4/8] Stopping app (pkill lsnode)"
            pkill -u myherder -f 'lsnode:' 2>/dev/null || true

            echo ">>> [5/8] Clean-slate: removing everything except .env, .htaccess, tmp/"
            find . -maxdepth 1 -mindepth 1 \
              ! -name '.env' \
              ! -name '.htaccess' \
              ! -name 'tmp' \
              -exec rm -rf {} +
            echo "After clean:"
            ls -la

            echo ">>> [6/8] Extracting tarball"
            tar xzf "$TARBALL"
            rm -f "$TARBALL"
            mkdir -p tmp
            echo "After extract:"
            ls -la

            echo ">>> [7/8] Running migrations"
            npx knex migrate:latest --env production

            echo ">>> [8/8] Restarting Passenger"
            touch tmp/restart.txt

            echo "Deployed commit: ${GITHUB_SHA:-unknown}"
          DEPLOY

      - name: Post-deploy smoke test
        run: |
          echo "Waiting for server to restart..."
          for i in 1 2 3 4 5 6; do
            HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' \
              -X POST -H 'Content-Type: application/json' -d '{}' \
              https://myherder.co.za/api/auth/login 2>/dev/null || echo "000")
            echo "Attempt $i: HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" != "000" ] && [ "$HTTP_CODE" != "502" ] && [ "$HTTP_CODE" != "503" ]; then
              echo "Smoke test passed: server responding (HTTP $HTTP_CODE)"
              exit 0
            fi
            sleep 5
          done
          echo "Smoke test FAILED: server not responding after 30 seconds"
          exit 1

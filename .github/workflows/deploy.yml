name: Deploy to cPanel

on:
  push:
    branches: [main]

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Install server dependencies
        run: npm ci

      - name: Install client dependencies
        run: cd client && npm ci

      - name: Lint (includes security rules)
        run: npm run lint

      - name: Backend type check
        run: npm run typecheck

      - name: Frontend type check
        run: cd client && npx vue-tsc --noEmit
        continue-on-error: true  # Pre-existing TS errors — don't block deploy

      - name: Backend tests
        run: npm test
        timeout-minutes: 5

      - name: Frontend tests
        run: cd client && npm run test:run

      - name: Build server (for boot test)
        run: npm run build:server

      - name: Production boot test
        run: |
          # Verify compiled server starts without crashing (catches missing modules)
          NODE_ENV=test timeout 10 node dist/index.js &
          SERVER_PID=$!
          sleep 3
          if kill -0 $SERVER_PID 2>/dev/null; then
            echo "Boot test passed — server started successfully"
            kill $SERVER_PID
            wait $SERVER_PID 2>/dev/null || true
          else
            echo "Boot test FAILED — server crashed on startup"
            exit 1
          fi

      - name: Dependency audit
        run: npm audit --audit-level=high || true

      - name: Dead code check (knip)
        run: npx knip || true

  deploy:
    needs: quality-gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Install all dependencies
        run: npm ci

      - name: Build server TypeScript
        run: npm run build:server

      - name: Build frontend
        run: cd client && npm ci && npm run build

      - name: Prepare production node_modules
        run: |
          # Prune to production-only deps (devDependencies never touch prod)
          rm -rf node_modules
          npm ci --omit=dev --ignore-scripts

      - name: Build deploy tarball
        run: |
          # Explicit allowlist — only files the server needs at runtime.
          # No source .ts, no tests, no plans/, no docs, no CI configs.
          tar czf deploy.tar.gz \
            app.js \
            package.json \
            package-lock.json \
            knexfile.js \
            dist \
            client/dist \
            node_modules \
            server/migrations \
            server/seeds/production
          ls -lh deploy.tar.gz

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to server
        run: |
          ssh-keyscan -H myherder.co.za >> ~/.ssh/known_hosts 2>/dev/null

          # Upload single tarball with everything the server needs
          scp deploy.tar.gz myherder@myherder.co.za:/tmp/deploy.tar.gz

          ssh -o StrictHostKeyChecking=no myherder@myherder.co.za 'bash -s' << 'DEPLOY'
            set -e  # Abort on ANY failure — never leave server half-deployed

            DEPLOY_DIR=/home/myherder/repositories/myherder

            source /home/myherder/nodevenv/repositories/myherder/24/bin/activate
            cd "$DEPLOY_DIR"

            # Paranoid safety check — never rm from wrong directory
            if [ "$(pwd)" != "$DEPLOY_DIR" ]; then
              echo "FATAL: cwd is $(pwd), expected $DEPLOY_DIR" >&2
              exit 1
            fi

            # Stop the app before replacing files (avoid serving mid-extract state)
            pkill -u myherder -f 'lsnode:' 2>/dev/null || true

            # Clean slate: remove every top-level entry EXCEPT persistent server state.
            # This wipes old source .ts, tests, plans/, docs, .git, node_modules, etc.
            find . -maxdepth 1 -mindepth 1 \
              ! -name '.env' \
              ! -name '.htaccess' \
              ! -name 'tmp' \
              -exec rm -rf {} +

            # Extract fresh build (only runtime files, per workflow allowlist)
            tar xzf /tmp/deploy.tar.gz
            rm /tmp/deploy.tar.gz
            mkdir -p tmp

            echo "Running migrations..."
            npx knex migrate:latest --env production
            echo "Migrations complete."

            # Restart Passenger
            touch tmp/restart.txt

            echo "Deployed commit: ${GITHUB_SHA:-unknown}"
          DEPLOY
        env:
          GITHUB_SHA: ${{ github.sha }}

      - name: Post-deploy smoke test
        run: |
          echo "Waiting for server to restart..."
          for i in 1 2 3 4 5 6; do
            HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' \
              -X POST -H 'Content-Type: application/json' -d '{}' \
              https://myherder.co.za/api/auth/login 2>/dev/null || echo "000")
            echo "Attempt $i: HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" != "000" ] && [ "$HTTP_CODE" != "502" ] && [ "$HTTP_CODE" != "503" ]; then
              echo "Smoke test passed: server responding (HTTP $HTTP_CODE)"
              exit 0
            fi
            sleep 5
          done
          echo "Smoke test FAILED: server not responding after 30 seconds"
          exit 1

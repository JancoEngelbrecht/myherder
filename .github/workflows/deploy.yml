name: Deploy to cPanel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Build frontend locally
        run: cd client && npm ci && npm run build

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to server
        run: |
          ssh-keyscan -H myherder.co.za >> ~/.ssh/known_hosts 2>/dev/null

          # Upload pre-built dist to server
          ssh -o StrictHostKeyChecking=no myherder@myherder.co.za 'rm -rf /home/myherder/repositories/myherder/client/dist'
          scp -r client/dist myherder@myherder.co.za:/home/myherder/repositories/myherder/client/

          # Pull code, install server deps, migrate, restart
          ssh -o StrictHostKeyChecking=no myherder@myherder.co.za 'bash -s' << 'DEPLOY'
            source /home/myherder/nodevenv/repositories/myherder/24/bin/activate
            cd /home/myherder/repositories/myherder

            # Clean any dirty files that block git pull
            git checkout -- package.json package-lock.json 2>/dev/null || true

            git pull origin main

            npm install --production

            npx knex migrate:latest --env production

            # Kill lsnode process so LiteSpeed spawns a fresh one with new code
            # (touch tmp/restart.txt does NOT work with LiteSpeed)
            pkill -u myherder -f 'lsnode:' 2>/dev/null || true
            touch tmp/restart.txt

            echo "Deployed commit: $(git log --oneline -1)"
          DEPLOY

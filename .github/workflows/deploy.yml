name: Deploy to cPanel

on:
  push:
    branches: [main]

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Install server dependencies
        run: npm ci

      - name: Install client dependencies
        run: cd client && npm ci

      - name: Lint (includes security rules)
        run: npm run lint

      - name: Backend type check
        run: npm run typecheck

      - name: Frontend type check
        run: cd client && npx vue-tsc --noEmit
        continue-on-error: true  # Pre-existing TS errors — don't block deploy

      - name: Backend tests
        run: npm test
        timeout-minutes: 5

      - name: Frontend tests
        run: cd client && npm run test:run

      - name: Dependency audit
        run: npm audit --audit-level=high || true

      - name: Dead code check (knip)
        run: npx knip || true

  deploy:
    needs: quality-gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Build server TypeScript
        run: npm run build:server

      - name: Build frontend
        run: cd client && npm ci && npm run build

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to server
        run: |
          ssh-keyscan -H myherder.co.za >> ~/.ssh/known_hosts 2>/dev/null

          # Upload pre-built server dist and client dist to server
          ssh -o StrictHostKeyChecking=no myherder@myherder.co.za 'rm -rf /home/myherder/repositories/myherder/dist /home/myherder/repositories/myherder/client/dist'
          scp -r dist myherder@myherder.co.za:/home/myherder/repositories/myherder/
          scp -r client/dist myherder@myherder.co.za:/home/myherder/repositories/myherder/client/

          # Pull code, install server deps, migrate, restart
          ssh -o StrictHostKeyChecking=no myherder@myherder.co.za 'bash -s' << 'DEPLOY'
            set -e
            source /home/myherder/nodevenv/repositories/myherder/24/bin/activate
            cd /home/myherder/repositories/myherder

            # Reset tracked files + clean untracked so git pull never fails
            # (SCP-uploaded client/dist adds new hashed-asset filenames that
            #  land as untracked files and would block `git pull` with
            #  "untracked working tree files would be overwritten".)
            git reset --hard HEAD
            git clean -fd client/dist dist
            git pull origin main

            # --ignore-scripts skips husky prepare hook (devDep, not in prod)
            npm install --omit=dev --ignore-scripts

            npx knex migrate:latest --env production

            # Kill lsnode process so LiteSpeed spawns a fresh one with new code
            # (touch tmp/restart.txt does NOT work with LiteSpeed)
            pkill -u myherder -f 'lsnode:' 2>/dev/null || true
            touch tmp/restart.txt

            echo "Deployed commit: $(git log --oneline -1)"
          DEPLOY

name: Deploy to cPanel

on:
  push:
    branches: [main]

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Install server dependencies
        run: npm ci

      - name: Install client dependencies
        run: cd client && npm ci

      - name: Lint (includes security rules)
        run: npm run lint

      - name: Backend type check
        run: npm run typecheck

      - name: Frontend type check
        run: cd client && npx vue-tsc --noEmit
        continue-on-error: true  # Pre-existing TS errors — don't block deploy

      - name: Backend tests
        run: npm test
        timeout-minutes: 5

      - name: Frontend tests
        run: cd client && npm run test:run

      - name: Build server (for boot test)
        run: npm run build:server

      - name: Production boot test
        run: |
          # Verify compiled server starts without crashing (catches missing modules)
          NODE_ENV=test timeout 10 node dist/server/index.js &
          SERVER_PID=$!
          sleep 3
          if kill -0 $SERVER_PID 2>/dev/null; then
            echo "Boot test passed — server started successfully"
            kill $SERVER_PID
            wait $SERVER_PID 2>/dev/null || true
          else
            echo "Boot test FAILED — server crashed on startup"
            exit 1
          fi

      - name: Dependency audit
        run: npm audit --audit-level=high || true

      - name: Dead code check (knip)
        run: npx knip || true

  deploy:
    needs: quality-gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install all dependencies
        run: npm ci

      - name: Build server TypeScript
        run: npm run build:server

      - name: Build frontend
        run: cd client && npm ci && npm run build

      - name: Prepare production node_modules
        run: |
          # Prune to production-only deps and compress for fast SCP
          rm -rf node_modules
          npm ci --omit=dev --ignore-scripts
          tar czf node_modules.tar.gz node_modules

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to server
        run: |
          ssh-keyscan -H myherder.co.za >> ~/.ssh/known_hosts 2>/dev/null

          # Upload pre-built server dist and client dist
          ssh -o StrictHostKeyChecking=no myherder@myherder.co.za 'rm -rf /home/myherder/repositories/myherder/dist /home/myherder/repositories/myherder/client/dist'
          scp -r dist myherder@myherder.co.za:/home/myherder/repositories/myherder/
          scp -r client/dist myherder@myherder.co.za:/home/myherder/repositories/myherder/client/

          # Upload production node_modules as tarball (~17MB compressed)
          scp node_modules.tar.gz myherder@myherder.co.za:/home/myherder/repositories/myherder/

          # Pull code, extract deps, migrate, restart
          ssh -o StrictHostKeyChecking=no myherder@myherder.co.za 'bash -s' << 'DEPLOY'
            set -e  # Abort on ANY failure — never kill the server if setup fails

            source /home/myherder/nodevenv/repositories/myherder/24/bin/activate
            cd /home/myherder/repositories/myherder

            # Reset tracked files + clean untracked so git pull never fails
            git reset --hard HEAD
            git clean -fd client/dist dist
            git pull origin main

            # Extract CI-built production dependencies (cPanel blocks npm install)
            echo "Extracting production node_modules..."
            tar xzf node_modules.tar.gz
            rm node_modules.tar.gz
            echo "Dependencies ready."

            echo "Running migrations..."
            npx knex migrate:latest --env production
            echo "Migrations complete."

            # Only restart if everything above succeeded (set -e guarantees this)
            pkill -u myherder -f 'lsnode:' 2>/dev/null || true
            touch tmp/restart.txt

            echo "Deployed commit: $(git log --oneline -1)"
          DEPLOY

      - name: Post-deploy smoke test
        run: |
          echo "Waiting for server to restart..."
          for i in 1 2 3 4 5 6; do
            HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' \
              -X POST -H 'Content-Type: application/json' -d '{}' \
              https://myherder.co.za/api/auth/login 2>/dev/null || echo "000")
            echo "Attempt $i: HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" != "000" ] && [ "$HTTP_CODE" != "502" ] && [ "$HTTP_CODE" != "503" ]; then
              echo "Smoke test passed: server responding (HTTP $HTTP_CODE)"
              exit 0
            fi
            sleep 5
          done
          echo "Smoke test FAILED: server not responding after 30 seconds"
          exit 1
